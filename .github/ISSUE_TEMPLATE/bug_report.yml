name: Bug report (Production)
description: Create a report to help us improve
title: ""
labels:
  - Type: Bug
body:
  - type: textarea
    id: describe-bug
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Bug was found on AndBible version
      description: Build XXX.X or version X.X.
      placeholder: Build XXX.X or version X.X
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |-
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false

  - type: dropdown
    id: device
    attributes:
      label: Device
      description: Select your device type.
      options:
        - iPhone
        - iPad
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: OS
      description: Select your operating system.
      options:
        - iOS
        - iPadOS
    validations:
      required: false

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: e.g. 17.5.1, 18.0 beta
      placeholder: "17.5.1"
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
