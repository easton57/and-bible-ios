name: Support request
description: Request help to solve your problem with AndBible
title: ""
labels:
  - Prio: Minor
  - Type: Support
assignees:
  - bvahedy
body:
  - type: markdown
    attributes:
      value: |-
        **FAQ first**

        Did you also check FAQ and not find solution there?
        https://github.com/AndBible/and-bible/wiki/FAQ

  - type: checkboxes
    id: faq-check
    attributes:
      label: FAQ first
      options:
        - label: I checked the FAQ and did not find a solution.
          required: true

  - type: textarea
    id: problem-description
    attributes:
      label: Describe your problem
      description: A clear and concise description of what's your problem.
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: I'm using AndBible version
      description: Build XXX.X or version X.X.
      placeholder: Build XXX.X or version X.X
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |-
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: false

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false

  - type: dropdown
    id: device
    attributes:
      label: Device
      description: Select your device type.
      options:
        - iPhone
        - iPad
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: OS
      description: Select your operating system.
      options:
        - iOS
        - iPadOS
    validations:
      required: false

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: e.g. 17.5.1, 18.0 beta
      placeholder: "17.5.1"
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false