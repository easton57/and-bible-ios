name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-standards:
    name: Repo Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure PR base ref is available
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run repo standards unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Check commit messages (pull request range)
        if: github.event_name == 'pull_request'
        run: >-
          python3 scripts/check_repo_standards.py commits
          --base-ref "origin/${{ github.base_ref }}"
          --head-ref HEAD

      - name: Check commit messages (push head commit)
        if: github.event_name == 'push'
        run: python3 scripts/check_repo_standards.py commits

      - name: Check Swift docblock style (full repo on pull request)
        if: github.event_name == 'pull_request'
        run: >-
          python3 scripts/check_repo_standards.py docblocks
          --base-ref "origin/${{ github.base_ref }}"
          --head-ref HEAD
          --all-files

      - name: Check Swift docblock style (full repo on push)
        if: github.event_name == 'push'
        run: python3 scripts/check_repo_standards.py docblocks --all-files

  localization-guardrails:
    name: Localization Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run SETPAR-603 guardrails
        run: python3 scripts/check_settings_localization_guardrails.py

  ios-build-and-test:
    name: Build And Test (Simulator)
    runs-on: macos-15
    timeout-minutes: 90
    env:
      DERIVED_DATA_PATH: .derivedData
      XCRESULT_BUNDLE_PATH: .artifacts/AndBibleTests.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore SwiftPM and build caches
        uses: actions/cache@v4
        with:
          path: |
            .derivedData/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('Package.swift', 'AndBible.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-spm-

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve iOS simulator destination
        id: simulator
        run: |
          python3 - <<'PY'
          import os
          import time
          import subprocess

          def parse_candidates(text: str):
              candidates = []
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if "{ platform:iOS Simulator" not in line:
                      continue
                  if not (line.startswith("{") and line.endswith("}")):
                      continue
                  parts = [p.strip() for p in line[1:-1].split(",")]
                  fields = {}
                  for part in parts:
                      if ":" not in part:
                          continue
                      key, value = part.split(":", 1)
                      fields[key.strip()] = value.strip()

                  name = fields.get("name", "")
                  sim_id = fields.get("id", "")
                  os_version = fields.get("OS", "")
                  platform = fields.get("platform", "")

                  if platform != "iOS Simulator":
                      continue
                  if name == "Any iOS Simulator Device":
                      continue
                  if sim_id.startswith("dvtdevice-"):
                      continue
                  if not name.startswith("iPhone"):
                      continue
                  candidates.append((name, os_version, sim_id))
              return candidates

          text = ""
          candidates = []
          cmd = [
              "xcodebuild",
              "-project", "AndBible.xcodeproj",
              "-scheme", "AndBible",
              "-showdestinations",
          ]
          for attempt in range(1, 4):
              proc = subprocess.run(cmd, capture_output=True, text=True)
              text = f"{proc.stdout}\n{proc.stderr}"
              candidates = parse_candidates(text)
              if proc.returncode == 0 and candidates:
                  break
              print(f"showdestinations attempt {attempt} failed; retrying")
              print(text)
              time.sleep(2)

          if not candidates:
              print("Unable to discover iPhone simulators from xcodebuild -showdestinations output")
              print(text)
              raise SystemExit(1)

          preferred_order = [
              "iPhone 17",
              "iPhone 16 Pro",
              "iPhone 16",
              "iPhone 15 Pro",
              "iPhone 15",
          ]

          selected = None
          for preferred in preferred_order:
              for candidate in candidates:
                  if candidate[0] == preferred:
                      selected = candidate
                      break
              if selected is not None:
                  break

          if selected is None:
              selected = candidates[0]

          name, os_version, sim_id = selected
          destination = f"id={sim_id}"

          print(f"Selected simulator: {name} (iOS {os_version})")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"destination={destination}\n")
              fh.write(f"device_name={name}\n")
              fh.write(f"os_version={os_version}\n")
          PY

      - name: Build and run unit tests
        run: >-
          mkdir -p .artifacts &&
          xcodebuild
          -project AndBible.xcodeproj
          -scheme AndBible
          -configuration Debug
          -destination "${{ steps.simulator.outputs.destination }}"
          -derivedDataPath "${DERIVED_DATA_PATH}"
          -resultBundlePath "${XCRESULT_BUNDLE_PATH}"
          CODE_SIGNING_ALLOWED=NO
          test

      - name: Upload xcodebuild test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: andbible-xcresult-${{ github.run_id }}
          path: ${{ env.XCRESULT_BUNDLE_PATH }}
          if-no-files-found: warn
          retention-days: 14
